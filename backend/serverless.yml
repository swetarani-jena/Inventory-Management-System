          cors: true

  rejectRequisition:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /requisitions/{requisitionId}/reject
          method: put
          cors: true

  # ── Vendors ────────────────────────────────────────────────
  getVendors:
    handler: functions/vendors/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /vendors
          method: get
          cors: true

  getVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /vendors/{vendorId}
          method: get
          cors: true

  createVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /vendors
          method: post
          cors: true

  updateVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /vendors/{vendorId}
          method: put
          cors: true

  # ── Purchase Orders ────────────────────────────────────────
  getPurchaseOrders:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /purchase-orders
          method: get
          cors: true

  getPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}
          method: get
          cors: true

  createPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /purchase-orders
          method: post
          cors: true

  sendPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}/send
          method: put
          cors: true

  deliverPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}/deliver
          method: put
          cors: true

  # ── Transfers ──────────────────────────────────────────────
  getTransfers:
    handler: functions/transfers/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /transfers
          method: get
          cors: true

  getTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /transfers/{transferId}
          method: get
          cors: true

  createTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /transfers
          method: post
          cors: true

  approveTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /transfers/{transferId}/approve
          method: put
          cors: true

  # ── Analytics ──────────────────────────────────────────────
  getAnalytics:
    handler: functions/analytics/index.handler
    layers:
      - !Ref MockDataLambdaLayer
    events:
      - http:
          path: /analytics/{report}
          method: get
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true