service: inventory-management-system

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${opt:stage, 'dev'}
    USERS_TABLE:          inventory-users-${opt:stage, 'dev'}
    WAREHOUSES_TABLE:     inventory-warehouses-${opt:stage, 'dev'}
    MATERIALS_TABLE:      inventory-materials-${opt:stage, 'dev'}
    INVENTORY_TABLE:      inventory-stock-${opt:stage, 'dev'}
    TRANSACTIONS_TABLE:   inventory-transactions-${opt:stage, 'dev'}
    REQUISITIONS_TABLE:   inventory-requisitions-${opt:stage, 'dev'}
    VENDORS_TABLE:        inventory-vendors-${opt:stage, 'dev'}
    PURCHASE_ORDERS_TABLE: inventory-purchase-orders-${opt:stage, 'dev'}
    TRANSFERS_TABLE:      inventory-transfers-${opt:stage, 'dev'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:ap-south-1:*:table/inventory-*
            - arn:aws:dynamodb:ap-south-1:*:table/inventory-*/index/*

package:
  patterns:
    - '!layers/**'
    - '!.serverless/**'
    - '!.gitignore'
    - '!README.md'

resources:
  Resources:

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-users-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH

    WarehousesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-warehouses-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: warehouseId
            AttributeType: S
        KeySchema:
          - AttributeName: warehouseId
            KeyType: HASH

    MaterialsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-materials-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: materialId
            AttributeType: S
        KeySchema:
          - AttributeName: materialId
            KeyType: HASH

    InventoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-stock-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: warehouseId
            AttributeType: S
          - AttributeName: materialId
            AttributeType: S
        KeySchema:
          - AttributeName: warehouseId
            KeyType: HASH
          - AttributeName: materialId
            KeyType: RANGE

    TransactionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-transactions-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: txnId
            AttributeType: S
          - AttributeName: warehouseId
            AttributeType: S
        KeySchema:
          - AttributeName: txnId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: warehouseId-index
            KeySchema:
              - AttributeName: warehouseId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    RequisitionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-requisitions-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: requisitionId
            AttributeType: S
        KeySchema:
          - AttributeName: requisitionId
            KeyType: HASH

    VendorsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-vendors-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: vendorId
            AttributeType: S
        KeySchema:
          - AttributeName: vendorId
            KeyType: HASH

    PurchaseOrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-purchase-orders-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: poId
            AttributeType: S
        KeySchema:
          - AttributeName: poId
            KeyType: HASH

    TransfersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: inventory-transfers-${opt:stage, 'dev'}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: transferId
            AttributeType: S
        KeySchema:
          - AttributeName: transferId
            KeyType: HASH

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: inventory-user-pool-${opt:stage, 'dev'}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: false
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: role
            AttributeDataType: String
            Mutable: true
            Required: false
          - Name: warehouseId
            AttributeDataType: String
            Mutable: true
            Required: false

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: inventory-app-client-${opt:stage, 'dev'}
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH  
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        GenerateSecret: false
        AccessTokenValidity: 8
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          RefreshToken: days

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient

layers:
  helpers:
    path: layers/mockData
    name: inventory-helpers-${opt:stage, 'dev'}
    description: Shared response helpers
    compatibleRuntimes:
      - nodejs18.x

functions:

  # ── Users ──────────────────────────────────────────────────
  getUsers:
    handler: functions/users/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /users
          method: get
          cors: true

  getUser:
    handler: functions/users/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /users/{userId}
          method: get
          cors: true

  createUser:
    handler: functions/users/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /users
          method: post
          cors: true

  updateUser:
    handler: functions/users/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /users/{userId}
          method: put
          cors: true

  # ── Warehouses ─────────────────────────────────────────────
  getWarehouses:
    handler: functions/warehouses/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /warehouses
          method: get
          cors: true

  getWarehouse:
    handler: functions/warehouses/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /warehouses/{warehouseId}
          method: get
          cors: true

  createWarehouse:
    handler: functions/warehouses/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /warehouses
          method: post
          cors: true

  updateWarehouse:
    handler: functions/warehouses/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /warehouses/{warehouseId}
          method: put
          cors: true

  # ── Materials ──────────────────────────────────────────────
  getMaterials:
    handler: functions/materials/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /materials
          method: get
          cors: true

  getMaterial:
    handler: functions/materials/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /materials/{materialId}
          method: get
          cors: true

  createMaterial:
    handler: functions/materials/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /materials
          method: post
          cors: true

  updateMaterial:
    handler: functions/materials/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /materials/{materialId}
          method: put
          cors: true

  # ── Inventory ──────────────────────────────────────────────
  getInventory:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory
          method: get
          cors: true

  getLowStock:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory/low-stock
          method: get
          cors: true

  getInventoryItem:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory/{warehouseId}/{materialId}
          method: get
          cors: true

  getTransactions:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory/transactions/{warehouseId}
          method: get
          cors: true

  recordGRN:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory/grn
          method: post
          cors: true

  recordMIN:
    handler: functions/inventory/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /inventory/min
          method: post
          cors: true

  # ── Requisitions ───────────────────────────────────────────
  getRequisitions:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /requisitions
          method: get
          cors: true

  getRequisition:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /requisitions/{requisitionId}
          method: get
          cors: true

  createRequisition:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /requisitions
          method: post
          cors: true

  approveRequisition:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /requisitions/{requisitionId}/approve
          method: put
          cors: true

  rejectRequisition:
    handler: functions/requisitions/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /requisitions/{requisitionId}/reject
          method: put
          cors: true

  # ── Vendors ────────────────────────────────────────────────
  getVendors:
    handler: functions/vendors/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /vendors
          method: get
          cors: true

  getVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /vendors/{vendorId}
          method: get
          cors: true

  createVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /vendors
          method: post
          cors: true

  updateVendor:
    handler: functions/vendors/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /vendors/{vendorId}
          method: put
          cors: true

  # ── Purchase Orders ────────────────────────────────────────
  getPurchaseOrders:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /purchase-orders
          method: get
          cors: true

  getPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}
          method: get
          cors: true

  createPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /purchase-orders
          method: post
          cors: true

  sendPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}/send
          method: put
          cors: true

  deliverPurchaseOrder:
    handler: functions/purchaseOrders/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /purchase-orders/{poId}/deliver
          method: put
          cors: true

  # ── Transfers ──────────────────────────────────────────────
  getTransfers:
    handler: functions/transfers/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /transfers
          method: get
          cors: true

  getTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /transfers/{transferId}
          method: get
          cors: true

  createTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /transfers
          method: post
          cors: true

  approveTransfer:
    handler: functions/transfers/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /transfers/{transferId}/approve
          method: put
          cors: true

  # ── Analytics ──────────────────────────────────────────────
  getAnalytics:
    handler: functions/analytics/index.handler
    layers:
      - !Ref HelpersLambdaLayer
    events:
      - http:
          path: /analytics/{report}
          method: get
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true